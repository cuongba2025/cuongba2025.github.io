<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baydep Super AI</title>

  <link rel="preconnect" href="https://baydep.buianhcuong2018.workers.dev" crossorigin>
  <link rel="dns-prefetch" href="https://baydep.buianhcuong2018.workers.dev">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298, #0072ff);
      background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }

    .container {
      width: 100%; max-width: 700px; padding: 50px 20px; background: rgba(0, 0, 0, 0.6);
      border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 { font-size: 3.5rem; margin-bottom: 20px; color: #00ffea; text-shadow: 0 0 15px rgba(0,255,234,0.6); }
    p { font-size: 1.4rem; line-height: 1.6; color: #e0e0e0; font-weight: 300; }

    /* ===== WIDGET CHAT ===== */
    #sfh-v-panel {
      position: fixed;
      bottom: calc(25px + env(safe-area-inset-bottom, 0px));
      right: calc(25px + env(safe-area-inset-right, 0px));
      z-index: 999999; text-align: left;
    }
    #sfh-v-trigger { width: 65px; height: 65px; background: linear-gradient(135deg, #00ffea, #0072ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 25px rgba(0, 255, 234, 0.4); position: relative; transition: transform 0.2s ease; }
    #sfh-v-trigger:hover { transform: scale(1.05); }

    #sfh-v-box {
      width: min(420px, calc(100vw - 50px));
      height: min(580px, calc(100vh - 130px));
      background: rgba(255, 255, 255, 0.98); border-radius: 24px; box-shadow: 0 15px 45px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; overflow: hidden;
      position: absolute; bottom: 85px; right: 0;
      transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s ease;
      transform-origin: bottom right;
    }
    #sfh-v-box.sfh-v-hide { transform: scale(0); opacity: 0; pointer-events: none; }

    #sfh-v-head { background: linear-gradient(135deg, #1e3c72, #0072ff); color: white; padding: 20px; display: flex; align-items: center; gap: 12px; position: relative; flex-shrink: 0; }
    .sfh-v-pfp { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .sfh-v-status { font-size: 11px; color: #00ffae; font-weight: bold; letter-spacing: 0.5px; }
    
    /* Tối ưu vị trí nút chức năng trên Header */
    #sfh-v-close { position: absolute; right: 15px; top: 23px; cursor: pointer; font-size: 18px; opacity: 0.8; padding: 5px; }
    #sfh-v-clear { position: absolute; right: 45px; top: 22px; cursor: pointer; font-size: 12px; opacity: 0.8; padding: 4px 8px; background: rgba(255,255,255,0.15); border-radius: 6px; font-weight: normal; transition: background 0.2s; }
    #sfh-v-clear:hover { background: rgba(255,255,255,0.3); opacity: 1; }

    #sfh-v-body { flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafb; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
    .sfh-v-row { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.55; color: #2d3436; word-wrap: break-word; overflow-wrap: break-word; }
    .sfh-v-sys { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .sfh-v-usr { background: #0072ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 3px 10px rgba(0,114,255,0.2); }

    .sfh-v-dots { background: transparent; box-shadow: none; padding: 5px 10px; display: flex; gap: 5px; align-items: center; }
    .sfh-v-dots span { width: 9px; height: 9px; background: #0072ff; border-radius: 50%; display: inline-block; animation: sfhBlink 1.4s infinite both; }
    .sfh-v-dots span:nth-child(2) { animation-delay: .2s; }
    .sfh-v-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes sfhBlink { 0%, 100% { opacity: .3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

    #sfh-v-foot { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; flex-shrink: 0; }
    #sfh-v-input { flex: 1; min-width: 0; padding: 12px 18px; border: 1px solid #e0e6ed; border-radius: 25px; outline: none; font-size: 16px; color: #2d3436; }
    #sfh-v-input:focus { border-color: #0072ff; }
    #sfh-v-btn { background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

    @media (max-width: 480px) {
      h1 { font-size: 2.4rem; }
      p { font-size: 1.1rem; }

      #sfh-v-panel {
        bottom: calc(15px + env(safe-area-inset-bottom, 0px));
        right: calc(15px + env(safe-area-inset-right, 0px));
      }
      
      #sfh-v-box {
        position: fixed;
        left: 10px;
        right: 10px;
        width: auto;
        height: calc(100vh - 100px);
        height: calc(100dvh - 100px);
        max-height: calc(100dvh - 100px);
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 Baydep Super AI</h1>
    <p>Đây là Bản AI dùng cho nội bộ Baydep Group.</p>
  </div>

  <div id="sfh-v-panel">
    <div id="sfh-v-trigger">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
    </div>
    <div id="sfh-v-box" class="sfh-v-hide">
      <div id="sfh-v-head">
        <div class="sfh-v-pfp">🤖</div>
        <div><strong>Baydep AI 2026</strong><div class="sfh-v-status">SIÊU AI BAYDEP 2026</div></div>
        <span id="sfh-v-clear" title="Xóa bộ nhớ đệm ca làm việc cũ">🗑️ Xóa lịch sử</span>
        <span id="sfh-v-close">✕</span>
      </div>
      <div id="sfh-v-body">
        <div class="sfh-v-row sfh-v-sys" id="sfh-welcome-msg">Dạ em chào Anh/Chị! Em là trợ lý Siêu AI của Baydep. Em đã sẵn sàng hỗ trợ Anh/Chị. Anh/Chị cần em giải đáp thông tin gì ạ?</div>
      </div>
      <div id="sfh-v-foot">
        <input type="text" id="sfh-v-input" placeholder="Nhập câu hỏi tại đây...">
        <button id="sfh-v-btn">Gửi</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const WORKER_URL = "https://baydep.buianhcuong2018.workers.dev/";
      const LOCAL_STORAGE_KEY = "baydep_internal_history";

      /* ===== QUẢN LÝ SESSION ID ===== */
      function getSessionId() {
        const KEY = "baydep_session";
        const TIMEOUT = 30 * 60 * 1000;
        const now = Date.now();

        let saved = null;
        try { saved = JSON.parse(sessionStorage.getItem(KEY)); } catch (e) {}

        if (!saved || !saved.id || (now - saved.last) > TIMEOUT) {
          saved = { id: crypto.randomUUID(), last: now };
        } else {
          saved.last = now;
        }

        try { sessionStorage.setItem(KEY, JSON.stringify(saved)); } catch (e) {}
        return saved.id;
      }

      /* ===== BOX CHAT ===== */
      const box    = document.getElementById('sfh-v-box');
      const bodyEl = document.getElementById('sfh-v-body');
      const input  = document.getElementById('sfh-v-input');

      let isLoading = false;
      
      // CHÍ MẠNG: Nạp thẳng lịch sử cũ từ máy nhân viên lên ngay khi mở Web
      let chatHistory = [];
      try {
        chatHistory = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
      } catch (e) { chatHistory = []; }

      const MAX_HISTORY = 6;

      function trimHistory() {
        if (chatHistory.length > MAX_HISTORY) {
          chatHistory = chatHistory.slice(-MAX_HISTORY);
        }
        while (chatHistory.length > 0 && chatHistory[0].role !== "user") {
          chatHistory.shift();
        }
      }

      // Khôi phục lại giao diện chat cũ cho nhân viên nhìn thấy nếu có lịch sử lưu trong máy
      function initRenderHistory() {
        if (chatHistory.length === 0) return;
        chatHistory.forEach(msg => {
          if (msg.role === "user") {
            const div = document.createElement('div');
            div.className = 'sfh-v-row sfh-v-usr';
            div.textContent = msg.content;
            bodyEl.appendChild(div);
          } else if (msg.role === "assistant") {
            const div = document.createElement('div');
            div.className = 'sfh-v-row sfh-v-sys';
            div.innerHTML = renderMarkdown(msg.content);
            bodyEl.appendChild(div);
          }
        });
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }

      function toggle() {
        box.classList.toggle('sfh-v-hide');
        if (!box.classList.contains('sfh-v-hide')) input.focus();
      }

      function renderMarkdown(raw) {
        return raw
          .replace(/(^|\s|•|-)\s*#+\s*/g, "$1")
          .replace(/---/g, "")
          .replace(/\n/g, "<br>")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      }

      function addRow(cls, text) {
        const div = document.createElement('div');
        div.className = 'sfh-v-row ' + cls;
        if (text !== undefined) div.textContent = text;
        bodyEl.appendChild(div);
        bodyEl.scrollTop = bodyEl.scrollHeight;
        return div;
      }

      /* Đòn bẩy Xóa sạch lịch sử khi nhân viên bấm nút 🗑️ */
      function clearCache() {
        if (confirm("Anh/Chị muốn xóa lịch sử cũ để bắt đầu tra cứu ca mới?")) {
          chatHistory = [];
          localStorage.removeItem(LOCAL_STORAGE_KEY);
          // Dọn sạch khung giao diện, chừa lại mỗi câu chào mặc định
          bodyEl.innerHTML = '<div class="sfh-v-row sfh-v-sys" id="sfh-welcome-msg">Dạ em chào Anh/Chị! Em là trợ lý Siêu AI của Baydep. Em đã sẵn sàng hỗ trợ Anh/Chị. Anh/Chị cần em giải đáp thông tin gì ạ?</div>';
        }
      }

      async function send() {
        if (isLoading) return;
        const text = input.value.trim();
        if (!text) return;

        isLoading = true;
        addRow('sfh-v-usr', text);
        input.value = '';

        chatHistory.push({ role: "user", content: text });
        trimHistory();
        
        // Cập nhật ngay vào LocalStorage để phòng ngừa rủi ro mất điện/F5 giữa chừng
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(chatHistory));

        const loading = addRow('sfh-v-dots');
        loading.innerHTML = '<span></span><span></span><span></span>';
        bodyEl.scrollTop = bodyEl.scrollHeight;

        try {
          const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: chatHistory,
              sessionId: getSessionId()
            })
          });

          if (!response.ok || !response.body) {
            loading.remove();
            addRow('sfh-v-sys', 'Hệ thống đang bận, Anh/Chị vui lòng gửi lại giúp em nhé!');
            chatHistory.pop();
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(chatHistory));
            isLoading = false;
            return;
          }

          loading.remove();
          const sDiv = addRow('sfh-v-sys');

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let fullReply = "";
          let buffer = "";

          let dirty = false, rafPending = false;

          function flush() {
            rafPending = false;
            if (!dirty) return;
            dirty = false;
            sDiv.innerHTML = renderMarkdown(fullReply);
            bodyEl.scrollTop = bodyEl.scrollHeight;
          }
          function schedule() {
            dirty = true;
            if (rafPending) return;
            rafPending = true;
            requestAnimationFrame(flush);
          }

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (let i = 0; i < lines.length; i++) {
              const line = lines[i].trim();
              if (!line.startsWith("data: ")) continue;
              const dataStr = line.slice(6).trim();
              if (dataStr === "[DONE]") continue;
              try {
                const content = JSON.parse(dataStr).choices?.[0]?.delta?.content || "";
                if (content) { fullReply += content; schedule(); }
              } catch (e) {}
            }
          }

          sDiv.innerHTML = renderMarkdown(fullReply);
          bodyEl.scrollTop = bodyEl.scrollHeight;

          if (fullReply.trim() !== "") {
            chatHistory.push({ role: "assistant", content: fullReply });
            trimHistory();
            // Khóa chốt lưu trữ toàn bộ chuỗi hội thoại sau khi stream kết thúc thành công
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(chatHistory));
          } else {
            chatHistory.pop();
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(chatHistory));
          }

        } catch (err) {
          if (loading && loading.parentNode) loading.remove();
          addRow('sfh-v-sys', 'Đứt mạch kết nối, Anh/Chị vui lòng gửi lại giúp em nhé!');
          chatHistory.pop();
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(chatHistory));
        }

        isLoading = false;
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }

      // Kích hoạt render lại đống tin nhắn cũ ngay khi load trang xong
      initRenderHistory();

      document.getElementById('sfh-v-trigger').addEventListener('click', toggle);
      document.getElementById('sfh-v-close').addEventListener('click', toggle);
      document.getElementById('sfh-v-clear').addEventListener('click', clearCache);
      document.getElementById('sfh-v-btn').addEventListener('click', send);
      input.addEventListener('keypress', function (e) { if (e.key === 'Enter') send(); });
    })();
  </script>
</body>
</html>
