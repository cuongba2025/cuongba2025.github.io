<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baydep Super AI - Beta Version</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    html, body { height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; }
    
    /* NỀN TĨNH CAO CẤP: Tối ưu 0% GPU cho máy Dell Precision mát rượi */
    body {
      background: #1e3c72;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #0072ff);
      background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    
    .container {
      width: 100%; max-width: 700px; padding: 45px 20px; background: rgba(0, 0, 0, 0.6);
      border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    h1 { font-size: 3.5rem; margin-bottom: 20px; color: #00ffea; text-shadow: 0 0 15px rgba(0,255,234,0.6); }
    p { font-size: 1.4rem; margin-bottom: 35px; line-height: 1.6; color: #e0e0e0; font-weight: 300; }
    
    /* BỐ CỤC ĐỒNG HỒ ĐẾM NGƯỢC CHUẨN 01/07/2026 */
    .countdown { display: flex; justify-content: center; gap: 15px; margin-bottom: 35px; }
    .countdown div { background: rgba(255, 255, 255, 0.08); padding: 20px 10px; border-radius: 15px; min-width: 90px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .countdown span { display: block; font-size: 2.2rem; font-weight: bold; color: #00ffae; }
    .countdown small { font-size: 0.9rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    
    .button { display: inline-block; padding: 15px 40px; font-size: 1.1rem; font-weight: bold; color: #fff; background: linear-gradient(135deg, #00c6ff, #0072ff); border-radius: 50px; text-decoration: none; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(0,114,255,0.4); }
    .button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,114,255,0.5); }
    
    .contact { margin-top: 25px; font-size: 1.2rem; opacity: 0.9; }
    .contact span { font-weight: bold; color: #00ffae; }

    /* ==================== WIDGET SIÊU AI BAYDEP 2026 ==================== */
    #sfh-v-panel { position: fixed; bottom: 25px; right: 25px; z-index: 999999; text-align: left; }
    #sfh-v-trigger { width: 65px; height: 65px; background: linear-gradient(135deg, #00ffea, #0072ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 25px rgba(0, 255, 234, 0.4); position: relative; transition: transform 0.2s ease; }
    #sfh-v-trigger:hover { transform: scale(1.05); }
    #sfh-v-badge { position: absolute; top: -2px; right: -2px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; padding: 2px 7px; border-radius: 12px; border: 2px solid #1e3c72; }
    
    #sfh-v-box { width: 420px; height: 580px; background: rgba(255, 255, 255, 0.98); border-radius: 24px; box-shadow: 0 15px 45px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; position: absolute; bottom: 85px; right: 0; transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); transform-origin: bottom right; }
    #sfh-v-box.sfh-v-hide { transform: scale(0); opacity: 0; pointer-events: none; }
    
    #sfh-v-head { background: linear-gradient(135deg, #1e3c72, #0072ff); color: white; padding: 20px; display: flex; align-items: center; gap: 12px; position: relative; }
    .sfh-v-pfp { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .sfh-v-status { font-size: 11px; color: #00ffae; font-weight: bold; letter-spacing: 0.5px; }
    #sfh-v-close { position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 18px; opacity: 0.8; }
    
    #sfh-v-body { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafb; display: flex; flex-direction: column; gap: 15px; }
    .sfh-v-row { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.55; color: #2d3436; }
    .sfh-v-sys { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .sfh-v-usr { background: #0072ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 3px 10px rgba(0,114,255,0.2); }
